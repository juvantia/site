name: Deploy Site to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'unnecessary' # We will scan below

      - name: Add Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Ensure target directory exists
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /var/www/juvantia/site"
          # Sync frontend files
          rsync -avz --delete dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/juvantia/site/
          # Sync backend files (preserve .env and node_modules)
          rsync -avz --delete --exclude='.env' --exclude='node_modules' --exclude='prisma/dev.db' backend/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/juvantia/backend/
          
      - name: Setup Backend on VPS
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/juvantia/backend
            # Install dependencies
            npm install
            # Generate Prisma client
            npx prisma generate
            # Restart backend service (if exists)
            sudo systemctl restart juvantia-backend || echo "Service not yet configured"
          EOF

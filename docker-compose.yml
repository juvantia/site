version: '3.8'

services:
  site:
    build: .
    container_name: site-service
    restart: always
    networks:
      - juvantia-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.site.rule=Host(`juvantia.org`) || Host(`www.juvantia.org`)"
      - "traefik.http.routers.site.entrypoints=websecure"
      - "traefik.http.routers.site.tls=true"
      - "traefik.http.routers.site.tls.certresolver=myresolver"
      - "traefik.http.services.site.loadbalancer.server.port=80"
      
      # HTTP to HTTPS Redirect
      - "traefik.http.routers.site-insecure.rule=Host(`juvantia.org`) || Host(`www.juvantia.org`)"
      - "traefik.http.routers.site-insecure.entrypoints=web"
      - "traefik.http.routers.site-insecure.middlewares=https-redirect@docker"

networks:
  juvantia-network:
    external: true

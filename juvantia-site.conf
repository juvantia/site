server {
    server_name juvantia.org www.juvantia.org;

    # Корень SPA
    root /var/www/juvantia/site;
    index index.html;

    # Allow larger uploads (Fix for 413 error)
    client_max_body_size 50M;

    # ---- Gzip settings ----
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # ---- Основная раздача SPA ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Backend API Proxy ----
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ---- Кеширование статики ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ---- Запрет скрытых файлов (.git и т.п.) ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- SSL (как выдал Certbot) ----
    listen 443 ssl; # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/juvantia.org-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/juvantia.org-0001/privkey.pem;   # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;   # managed by Certbot
}

# HTTP -> HTTPS редирект
server {
    listen 80;
    server_name juvantia.org www.juvantia.org;
    return 301 https://$host$request_uri;
}
